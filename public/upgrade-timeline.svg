    <rect x="1114" y="110" width="108" height="34" rx="7" fill="#DDD6FE" stroke="#0F172A" stroke-width="2"/>
    <text x="1168" y="132" text-anchor="middle" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Altair</text>
