  <rect x="820" y="300" width="160" height="34" rx="7" fill="#DCFCE7" stroke="#0F172A" stroke-width="2"/>
  <text x="900" y="322" text-anchor="middle" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Merge / Post-merge era</text>

  <rect x="40" y="710" width="18" height="18" fill="#67E8F9" stroke="#0F172A" stroke-width="2"/>
  <text x="66" y="724" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500">Execution layer</text>

  <rect x="210" y="710" width="18" height="18" fill="#BBF7D0" stroke="#0F172A" stroke-width="2"/>
  <text x="236" y="724" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500">Consensus layer</text>

  <rect x="396" y="710" width="18" height="18" fill="#FDE68A" stroke="#0F172A" stroke-width="2"/>
  <text x="422" y="724" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500">Post-merge Ethereum mainnet</text>
