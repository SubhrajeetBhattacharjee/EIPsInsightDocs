<svg width="1600" height="780" viewBox="0 0 1600 780" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ethereum Network Upgrade Timeline</title>
  <desc id="desc">A horizontal timeline of major Ethereum upgrades from Frontier through Glamsterdam with labeled milestones and phases.</desc>
  <rect width="1600" height="780" rx="28" fill="#F8FAFC"/>
  <text x="40" y="78" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800">Ethereum Network Upgrade Timeline</text>
  <text x="40" y="112" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500">Major protocol milestones and the phases that shaped Ethereum's upgrade path</text>

  <line x1="72" y1="360" x2="1528" y2="360" stroke="#1F2937" stroke-width="12" stroke-linecap="round"/>

  <rect x="46" y="342" width="92" height="36" rx="8" fill="#67E8F9" stroke="#0F172A" stroke-width="2"/>
  <text x="92" y="366" text-anchor="middle" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Frontier</text>

  <g stroke="#0F172A" stroke-width="3" stroke-dasharray="8 8">
    <line x1="210" y1="360" x2="210" y2="452"/>
    <line x1="298" y1="360" x2="298" y2="452"/>
    <line x1="388" y1="360" x2="388" y2="452"/>
    <line x1="496" y1="360" x2="496" y2="452"/>
    <line x1="590" y1="360" x2="590" y2="452"/>
    <line x1="706" y1="360" x2="706" y2="452"/>
    <line x1="820" y1="360" x2="820" y2="452"/>
    <line x1="944" y1="360" x2="944" y2="452"/>
    <line x1="1054" y1="360" x2="1054" y2="452"/>
    <line x1="1168" y1="360" x2="1168" y2="452"/>
    <line x1="1284" y1="360" x2="1284" y2="452"/>
    <line x1="1406" y1="360" x2="1406" y2="452"/>
  </g>

  <g>
