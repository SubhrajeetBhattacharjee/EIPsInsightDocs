    <rect x="1010" y="170" width="88" height="32" rx="7" fill="#BBF7D0" stroke="#0F172A" stroke-width="2"/>
    <text x="1054" y="190" text-anchor="middle" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Paris</text>
