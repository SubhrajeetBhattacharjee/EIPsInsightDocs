    <rect x="150" y="468" width="120" height="34" rx="7" fill="#BAE6FD" stroke="#0F172A" stroke-width="2"/>
    <text x="210" y="490" text-anchor="middle" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Homestead</text>
  </g>

  <g>
